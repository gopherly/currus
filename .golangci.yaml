# golangci-lint configuration (HARD/REQUIRED checks)
# This config contains only critical linters that must pass.
version: "2"

linters:
  enable:
    # === SECURITY ===
    # bidichk: Detects dangerous Unicode bidirectional text (security)
    # Prevents invisible characters that can hide malicious code
    - bidichk

    # gosec: Security vulnerability scanner
    # Detects SQL injection, hardcoded creds, path traversal, bad TLS, etc.
    - gosec

    # asciicheck: Prevents non-ASCII identifiers (portability + homoglyph attacks)
    # BAD: func calculateСумма() {} // Cyrillic 'С' looks identical to Latin 'C'
    # GOOD: func calculateSum() {}
    - asciicheck

    # === CRITICAL BUGS ===
    # errcheck: Ensures errors are checked (critical bugs)
    # BAD:  file.Close()
    # GOOD: if err := file.Close(); err != nil { return err }
    - errcheck

    # nilnesserr: Enhanced nilerr - catches complex nil/error mismatches
    # BAD:  if err != nil { return nil, differentErr }
    # GOOD: if err != nil { return nil, err }
    - nilnesserr

    # nilnil: Catches returning nil error with nil/invalid value
    # BAD:  func GetUser(id int) (*User, error) { return nil, nil }
    # GOOD: func GetUser(id int) (*User, error) { return nil, ErrNotFound }
    - nilnil

    # staticcheck: The gold standard Go linter (has autofix)
    # Catches 100+ bug patterns, style issues, and simplifications
    - staticcheck

    # govet: Standard Go vet checks (extended)
    # Catches printf errors, mutex copies, struct tag issues, shadowing, etc.
    - govet

    # bodyclose: Ensures HTTP response bodies are closed (resource leaks)
    # BAD:  resp, _ := http.Get(url); return resp.StatusCode
    # GOOD: resp, _ := http.Get(url); defer resp.Body.Close()
    - bodyclose

    # forcetypeassert: Catches unsafe type assertions that can panic
    # BAD:  s := v.(string)           // panics if v is not string
    # GOOD: s, ok := v.(string); if !ok { return err }
    - forcetypeassert

    # ineffassign: Detects assignments to variables that are never used
    # BAD:  x := compute(); x = 5; return x // first assignment wasted
    # GOOD: x := 5; return x
    - ineffassign

    # wastedassign: Finds assignments whose values are never read before reassignment
    # BAD:  x := 1; x = 2; return x // initial value 1 is never used
    # GOOD: x := 2; return x
    - wastedassign

    # unconvert: Removes unnecessary type conversions
    # BAD:  int(x) when x is already int
    # GOOD: x directly
    - unconvert

    # === CORRECTNESS ===
    # errorlint: Ensures proper Go 1.13+ error handling
    # BAD:  if err == ErrNotFound { }        // breaks with wrapped errors
    # GOOD: if errors.Is(err, ErrNotFound) { }
    - errorlint

    # contextcheck: Ensures context is properly propagated
    # BAD:  func Handle(ctx context.Context) { doWork(context.Background()) }
    # GOOD: func Handle(ctx context.Context) { doWork(ctx) }
    - contextcheck

    # fatcontext: Detects nested contexts in loops (memory leak)
    # BAD:  for _, item := range items { ctx = context.WithValue(ctx, k, item) }
    # GOOD: for _, item := range items { itemCtx := context.WithValue(ctx, k, item) }
    - fatcontext

    # spancheck: Validates OpenTelemetry span handling
    # BAD:  span := tracer.Start(ctx, "op"); /* no span.End() */
    # GOOD: defer span.End(); span.RecordError(err); span.SetStatus(codes.Error)
    - spancheck

    # durationcheck: Catches duration * duration bugs
    # BAD:  timeout := time.Second * time.Second  // nonsense: 1e18 ns!
    # GOOD: timeout := 5 * time.Second
    - durationcheck

    # makezero: Catches slice initialization bugs
    # BAD:  s := make([]int, 5); s = append(s, 1)  // s has 6 elements, not 1!
    # GOOD: s := make([]int, 0, 5); s = append(s, 1)
    - makezero

    # reassign: Prevents reassignment of package-level variables
    # BAD:  io.EOF = errors.New("custom")  // breaks all io.EOF checks!
    # GOOD: Don't reassign package variables
    - reassign

    # containedctx: Detects context.Context stored in structs (anti-pattern)
    # BAD:  type Server struct { ctx context.Context }
    # GOOD: pass ctx as first parameter to methods
    - containedctx

    # copyloopvar: Detects unnecessary loop variable copies (Go 1.22+ semantics)
    # BAD:  for _, v := range items { v := v; go process(v) }
    # GOOD: for _, v := range items { go process(v) } // Go 1.22+ loop vars are per-iteration
    - copyloopvar

    # gocheckcompilerdirectives: Validates //go: compiler directives
    # BAD:  //go:noinlin  // typo — silently ignored by the compiler!
    # GOOD: //go:noinline
    - gocheckcompilerdirectives

    # === API / NAMING ===
    # errname: Enforces error naming conventions
    # BAD:  var Failed = errors.New("failed")
    # GOOD: var ErrFailed = errors.New("failed")
    - errname

    # inamedparam: Requires named parameters in interface methods
    # BAD:  type Handler interface { Handle(context.Context, string) error }
    # GOOD: type Handler interface { Handle(ctx context.Context, id string) error }
    - inamedparam

    # ireturn: Enforces "accept interfaces, return concrete types" principle
    # BAD:  func NewReader() io.Reader { return &myReader{} }
    # GOOD: func NewReader() *MyReader { return &MyReader{} }
    # Exception: Engine is currus's deliberate public API surface; it is allowlisted below.
    - ireturn

    # err113: Requires errors to be defined as variables, not created inline
    # BAD:  return errors.New("not found")           // breaks errors.Is callers
    # GOOD: var ErrNotFound = errors.New("not found"); return ErrNotFound
    # NOTE: fmt.Errorf("context: %w", err) is allowed — it wraps, not creates.
    - err113

    # recvcheck: Ensures consistent receiver types (pointer vs value) within a type
    # BAD:  func (t Type) A() {}; func (t *Type) B() {} // inconsistent
    # GOOD: func (t *Type) A() {}; func (t *Type) B() {} // consistent
    - recvcheck

    # nakedret: Flags naked returns in longer functions
    # BAD:  func foo() (x int) { x = 5; /* 20 lines */ return }
    # GOOD: func foo() (x int) { x = 5; /* 20 lines */ return x }
    - nakedret

    # predeclared: Catches shadowing of Go's predeclared identifiers
    # BAD:  len := 5       // shadows builtin len()
    # BAD:  error := "msg" // shadows the builtin error type
    # GOOD: length := 5; errMsg := "msg"
    - predeclared

    # revive: Style + API hygiene rules
    # Used here for unexported return type checks on exported funcs.
    - revive

    # forbidigo: Forbid risky textual patterns
    # Used here to block `any` in exported function signatures.
    - forbidigo

    # godoclint: Go doc comment practice (godoc-lint via golangci-lint).
    # Aligns with docs/documentation-standards.md. Rules that duplicate
    # staticcheck ST1020–ST1022 or revive package-comments are disabled below.
    - godoclint

    # gocritic (go-critic): Extra bug/perf/style diagnostics beyond vet/staticcheck.
    # Tags add checks on top of go-critic defaults; performance checks are off by default
    # in go-critic unless explicitly enabled. Style tag omitted here (overlap with revive).
    # https://go-critic.com/overview.html
    - gocritic

    # modernize: Suggest simplifications using modern Go/stdlib (golangci-lint ≥ v2.6.0).
    # Disabled analyzers below align with forbidigo (`any`) and conservative API choices.
    - modernize

    # === HYGIENE / CONSISTENCY ===
    # gomoddirectives: go.mod directive hygiene (replace, retract, toolchain, etc.).
    - gomoddirectives

    # nolintlint: Ill-formed //nolint directives; keeps suppressions specific and effective.
    - nolintlint

    # thelper: Test helpers should call t.Helper() so failures point at call sites (testing-standards.md).
    - thelper

    # paralleltest: Unsafe t.Parallel() patterns; ignore-missing avoids requiring Parallel everywhere.
    - paralleltest

    # loggercheck: slog (and optional libs) key/value pairing at call sites.
    - loggercheck

    # usestdlibvars: Prefer stdlib named constants (HTTP methods/status, time layouts, etc.).
    - usestdlibvars

    # mirror: Prefer bytes/strings stdlib helpers where appropriate (may overlap modernize).
    - mirror

    # misspell / dupword: Typos and duplicated words (comments-focused where configured below).
    - misspell
    - dupword

    # === TEST QUALITY ===
    # usetesting: Prefer testing package helpers over os equivalents (has autofix)
    # BAD:  os.MkdirTemp("", "test"); os.Setenv("K", "v")
    # GOOD: t.TempDir(); t.Setenv("K", "v"); t.Context()
    - usetesting

    # testableexamples: Ensures Example functions have expected output comments
    # BAD:  func ExampleFoo() { fmt.Println("hello") } // no // Output: comment — untested!
    # GOOD: func ExampleFoo() { fmt.Println("hello") }
    #       // Output: hello
    - testableexamples

    # testifylint: enforces correct github.com/stretchr/testify usage.
    # BAD:  assert.NoError(t, err); use(got) // flow depends on err being nil
    # GOOD: require.NoError(t, err); use(got)
    - testifylint

    # === COMPLEXITY ===
    # cyclop: cyclomatic complexity per function (number of independent paths).
    - cyclop

    # gocognit: cognitive complexity — how hard a function is to understand
    # (weights nesting and branching), complementary to cyclop.
    - gocognit

    # nestif: reports deeply nested if statements; prefer early returns.
    - nestif

    # === CORRECTNESS / SAFETY ===
    # exhaustive: enum switch completeness; a default clause counts as exhaustive.
    - exhaustive

    # noctx: HTTP requests must carry a context. Guards future custom transports;
    # the moby/containerd clients are context-aware already.
    - noctx

    # canonicalheader: canonical HTTP header names (Header.Get("Content-Type")).
    - canonicalheader

    # nosprintfhostport: prevents IPv6-breaking host:port building with Sprintf.
    # GOOD: net.JoinHostPort(host, port)
    - nosprintfhostport

    # asasalint: catches []any passed as a single argument to a func(...any).
    # BAD:  logItems(values)    // logs [["a","b"]]
    # GOOD: logItems(values...) // logs ["a","b"]
    - asasalint

    # errchkjson: flags json.Marshal of types that can fail to encode.
    - errchkjson

    # === HYGIENE ===
    # sloglint: enforce slog key/value style (kv-only, snake_case keys, ctx in scope).
    - sloglint

    # depguard: ban deprecated/forbidden imports (math/rand, io/ioutil, pkg/errors).
    - depguard

    # goheader: enforce the Apache 2.0 license header on every source file.
    - goheader

    # perfsprint: prefer strconv / concatenation over fmt.Sprintf where cheaper.
    # BAD:  fmt.Sprintf("%d", n)
    # GOOD: strconv.Itoa(n)
    - perfsprint

    # exptostd: replace golang.org/x/exp helpers with their stdlib equivalents.
    - exptostd

    # dogsled: flag too many blank identifiers in a single assignment.
    - dogsled

    # prealloc: suggests pre-allocating slices that are grown inside loops.
    # BAD:  var out []T; for _, v := range in { out = append(out, f(v)) }
    # GOOD: out := make([]T, 0, len(in)); for _, v := range in { ... }
    - prealloc

    # unparam: reports unused function params and always-identical returns.
    # BAD:  func f(a, b int) int { return a } // b is never used
    # GOOD: func f(a int) int { return a }
    - unparam

    # === STYLE ===
    # nlreturn: require a blank line before return/branch statements.
    - nlreturn

    # === STRUCT TAGS ===
    # tagliatelle: enforce struct tag naming conventions (snake_case keys).
    - tagliatelle

    # tagalign: keep struct tags aligned and ordered (has autofix).
    - tagalign

  settings:
    bidichk:
      # All Unicode bidirectional overrides are dangerous - check all
      left-to-right-embedding: true
      right-to-left-embedding: true
      pop-directional-formatting: true
      left-to-right-override: true
      right-to-left-override: true
      left-to-right-isolate: true
      right-to-left-isolate: true
      first-strong-isolate: true
      pop-directional-isolate: true

    errcheck:
      # Check type assertions: a := b.(Type) can panic if wrong
      check-type-assertions: true
      # Check blank assignments: _, _ = funcReturningError()
      check-blank: true
      # Don't exclude common functions - be thorough
      disable-default-exclusions: false
      exclude-functions: []
      verbose: true

    errorlint:
      # Check fmt.Errorf uses %w for wrapping (preserves error chain)
      errorf: true
      # Check type assertions use errors.As instead of type assertion
      asserts: true
      # Check comparisons use errors.Is instead of ==
      comparison: true

    fatcontext:
      # Check struct pointers for context accumulation
      check-struct-pointers: false

    gosec:
      # Filter by severity (low, medium, high)
      severity: medium
      # Filter by confidence (low, medium, high)
      confidence: medium

    gomoddirectives:
      replace-local: false
      retract-allow-no-explanation: false
      check-module-path: true

    govet:
      enable:
        # Variable shadowing detection
        - shadow
        # Nil pointer dereference checks
        - nilness
        # Unused writes detection
        - unusedwrite
      settings:
        shadow:
          # Strict shadowing checks
          strict: true

    makezero:
      # Strict mode: only allow make([]T, 0) or make([]T, 0, cap)
      always: true

    nilnil:
      # Also catch: return validValue, someError (opposite problem)
      detect-opposite: true

    reassign:
      # Check ALL package variables
      patterns:
        - ".*"

    revive:
      rules:
        # Prevent exported functions/methods from returning unexported types.
        # This catches patterns like: func WithStringPrompt(...) anUnexportedType
        - name: unexported-return

        # Require a package-level comment that starts with "Package <name>".
        # Enforces docs/documentation-standards.md "Package Documentation (doc.go)".
        - name: package-comments

        # Enforce Go naming conventions for variables, parameters, and types
        # (camelCase, common initialism casing like URL/HTTP/ID, no underscores).
        - name: var-naming

        # Note: revive's `exported` rule overlaps with staticcheck's ST1020/ST1021/ST1022
        # (which are enabled by `staticcheck.checks: ["all"]` above). We rely on
        # staticcheck for the "exported X must have a doc starting with X" check
        # to avoid duplicate warnings.

    forbidigo:
      # Ban exported function signatures that use `any`.
      # Keep internal use of `any` allowed.
      forbid:
        - pattern: "^func\\s+\\([^)]+\\)\\s+[A-Z][A-Za-z0-9_]*\\([^)]*\\bany\\b"
        - pattern: "^func\\s+[A-Z][A-Za-z0-9_]*\\([^)]*\\bany\\b"

    godoclint:
      default: all
      options:
        max-len:
          length: 80
      disable:
        # staticcheck ST1021/ST1022: comment should start with symbol name.
        - start-with-name
        # staticcheck ST1020: exported identifiers must have a doc comment.
        - require-doc

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      # lipgloss.Style, theme/slog types are large by design; value receivers and
      # range over spec slices are intentional for this API.
      disabled-checks:
        - hugeParam
        - rangeValCopy

    modernize:
      # By default all analyzers run; these are opted out (see modernize docs).
      disable:
        - any # Conflicts with forbidigo on exported signatures; keep interface{} where used.

    spancheck:
      checks:
        # Ensure span.End() is called (usually via defer)
        - end
        # Ensure span.RecordError(err) when returning error
        - record-error
        # Ensure span.SetStatus(codes.Error, msg) when returning error
        - set-status

    staticcheck:
      # Enable all checks (SA*, S*, ST*, QF*)
      checks: ["all"]

    nolintlint:
      # Fail unused //nolint and require naming the suppressed linter (no bare //nolint).
      allow-unused: false
      allow-no-explanation: []
      require-explanation: false
      require-specific: true

    paralleltest:
      # Only flag incorrect Parallel usage; do not require t.Parallel on every test/subtest.
      ignore-missing: true
      ignore-missing-subtests: true

    loggercheck:
      # Currus uses log/slog; disable checks for loggers not used in-tree.
      kitlog: false
      klog: false
      logr: false
      slog: true
      zap: false

    misspell:
      locale: US
      mode: restricted
      # Docs use British spellings and proper nouns; US locale otherwise.
      ignore-rules:
        - colour
        - spectre

    dupword:
      comments-only: true

    inamedparam:
      # Allow unnamed parameter when there is only one.
      # e.g., func Close(context.Context) error is acceptable.
      skip-single-param: true

    ireturn:
      allow:
        - anon    # anonymous interfaces
        - error   # error interface (idiomatic)
        - empty   # interface{} / any
        - stdlib  # standard library interfaces (io.Reader, etc.)
        - generic # generic interfaces (Go 1.18+)
        # Engine is the deliberate public API surface of currus.
        # New() and MustNew() intentionally return this interface.
        - "gopherly\\.dev/currus"

    nakedret:
      # Allow naked returns only in trivially short functions.
      max-func-lines: 5

    predeclared:
      # Also check method and field names, not just local variables.
      qualified-name: true

    unconvert:
      # Conservative mode: skip cases where the conversion may be load-bearing
      # on some architectures to avoid false positives.
      safe: true

    usetesting:
      os-create-temp: true
      os-mkdir-temp: true
      os-setenv: true
      os-chdir: true
      # Use t.Context() instead of context.Background()/Todo() in tests (Go 1.24+).
      context-background: true
      context-todo: true

    cyclop:
      # Max cyclomatic complexity per function (15 = practical, not strict-10).
      max-complexity: 15
      # Package-average check disabled: noisy for packages of many simple funcs.
      package-average: 0.0

    gocognit:
      # Cognitive complexity threshold (how hard a function is to follow).
      min-complexity: 20

    nestif:
      # Minimum nesting depth to report.
      min-complexity: 5

    exhaustive:
      # A default clause satisfies the exhaustiveness check.
      default-signifies-exhaustive: true

    depguard:
      rules:
        main:
          deny:
            - pkg: "math/rand$"
              desc: use math/rand/v2 for a better API (Go 1.22+)
            - pkg: github.com/pkg/errors
              desc: use the standard errors package with fmt.Errorf and %w
            - pkg: io/ioutil
              desc: deprecated in Go 1.16, use the io and os packages

    sloglint:
      # No mixing of key-value pairs and slog.Attr in the same call.
      no-mixed-args: true
      # Use key-value style: slog.Info("msg", "key", value).
      kv-only: true
      # Require context-aware calls (e.g. DebugContext) when a ctx is in scope.
      context: scope
      # Enforce snake_case for log keys.
      key-naming-case: snake

    perfsprint:
      integer-format: true
      int-conversion: true
      error-format: true
      errorf: true
      string-format: true
      sprintf1: true
      strconcat: true
      bool-format: true
      hex-format: true
      # Flag string concatenation inside loops (prefer strings.Builder).
      concat-loop: true

    testifylint:
      # Enable every checker, then opt out where it does not fit this repo.
      enable-all: true
      formatter:
        # Validate Sprintf-style format strings passed as assert messages.
        check-format-string: true
        # Prefer the *f variants (Equalf, Errorf) when a message is supplied.
        require-f-funcs: true
      require-error:
        # Force require (not assert) for these when the result gates later code.
        fn-pattern: ^(Errorf?|NoErrorf?)$
      expected-actual:
        # Order is assert.Equal(expected, actual); match vars named "expected".
        pattern: ^expected
      bool-compare:
        ignore-custom-types: false
      go-require:
        ignore-http-handlers: false
      suite-extra-assert-call:
        mode: remove

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          toml: snake
          mapstructure: snake

    tagalign:
      # Align and sort struct tags consistently (autofixable).
      align: true
      sort: true
      order:
        - json
        - yaml
        - toml
        - mapstructure

    prealloc:
      # NOTE: prealloc is a micro-optimization; keep it conservative to avoid noise.
      # Only flag obvious cases on range loops, skip classic for loops.
      simple: true
      range-loops: true
      for-loops: false

    nlreturn:
      # Allow tiny blocks to keep return inline without requiring a blank line.
      block-size: 2

    unparam:
      # Keep exported API params even when unused (stable public surface).
      check-exported: false

    asasalint:
      # fmt/log-style variadic funcs handle []any correctly; keep their exclusions.
      use-builtin-exclusions: true

    goheader:
      values:
        regexp:
          # Accept any 4-digit year so headers don't churn each January.
          YEAR: \d{4}
      template: |-
        Copyright {{ YEAR }} The Gopherly Authors

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

            http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.

    thelper:
      # *testing.T / *testing.B: require t.Helper() at start of helpers.
      # testing.TB: example helpers may accept nil tb; first stmt cannot be tb.Helper().
      tb:
        begin: false

formatters:
  enable:
    # gofumpt: Stricter gofmt with additional consistency rules
    - gofumpt

    # gci: Import statement organization with granular control
    - gci

  settings:
    gofumpt:
      # Module path for determining local imports
      module-path: gopherly.dev/currus
      # Enable additional formatting rules beyond gofmt
      extra-rules: true

    gci:
      # Import section order
      sections:
        - standard                    # Standard library packages
        - default                     # Third-party packages
        - prefix(gopherly.dev/currus) # All gopherly.dev/currus/* local modules
        - blank                       # Blank imports (side effects)
        - alias                       # Aliased imports
      custom-order: true
      no-inline-comments: true
      no-prefix-comments: true

issues:
  # Report all critical issues
  max-issues-per-linter: 0
  max-same-issues: 0
  # Don't auto-fix by default (CI should detect, not modify)
  fix: false

run:
  # Timeout for total work
  timeout: 5m
